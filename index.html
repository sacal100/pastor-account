const CLIENT_ID ='576093546926-37l6braqks8obv90pe0etf1seql3r552.apps.googleusercontent.com';
const fileName = "index.html";
const fileContent = <!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>목회자 가계부 - 드라이브 통합관리</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root { --navy: #1a3a5c; --gold: #c9a84c; --income: #2d6a4f; --expense: #9b2335; --asset: #1d4e89; --border: #dde4ed; --white: #ffffff; --bg: #eef2f7; --radius: 12px; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: #333; padding-bottom: 80px; min-height: 100dvh; }
.sync-bar { background: #0f2440; color: white; padding: 10px 15px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 110; }
.sync-btn { background: var(--gold); border: none; color: #000; padding: 5px 12px; border-radius: 6px; font-weight: 700; cursor: pointer; }
.app-header { background: var(--navy); color: white; padding: 15px; text-align: center; }
.month-selector { display: flex; align-items: center; justify-content: center; gap: 20px; }
.m-nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }
.tab-bar { display: flex; background: #0f2440; position: sticky; top: 38px; z-index: 100; overflow-x: auto; }
.tab-btn { flex: 1; min-width: 80px; color: #aaa; padding: 12px; border: none; background: none; font-size: 12px; cursor: pointer; }
.tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); font-weight: 700; }
.page { display: none; padding: 15px; }
.page.active { display: block; }
.section { background: var(--white); border-radius: var(--radius); margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.section-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; gap: 10px; padding-left: 15px; padding-right: 15px; }
.item-input { width: 110px; text-align: right; border: 1px solid var(--border); border-radius: 6px; padding: 7px; font-weight: 700; }
.add-custom { display: flex; gap: 8px; margin: 10px 15px; padding: 10px; background: #f1f4f8; border-radius: 8px; }
.report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.report-table th, .report-table td { border: 1px solid var(--border); padding: 10px 5px; text-align: right; }
.fab { position: fixed; bottom: 25px; right: 20px; width: 60px; height: 60px; background: var(--navy); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 50; }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 300; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="sync-bar">
  <span id="sync-status">☁️ 드라이브 미연결</span>
  <button id="auth-btn" class="sync-btn" onclick="handleAuthClick()">로그인 동기화</button>
</div>
<div class="app-header">
  <div class="month-selector"><button class="m-nav-btn" onclick="changeMonth(-1)">‹</button><h2 id="currentMonthDisplay"></h2><button class="m-nav-btn" onclick="changeMonth(1)">›</button></div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('income')">수입/자산</button>
  <button class="tab-btn" onclick="showTab('expense')">지출항목</button>
  <button class="tab-btn" onclick="showTab('daily')">지출기록</button>
  <button class="tab-btn" onclick="showTab('report')">연간결산</button>
</div>
<div id="toast" class="toast">저장되었습니다</div>
<div class="page active" id="page-income">
  <div class="section"><div class="section-header">💰 수입 항목 <span id="sum-inc" style="color:var(--income)">0원</span></div><div class="section-body" id="income-list"></div><div class="add-custom"><input type="text" id="new-inc-name" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd" placeholder="새 수입 항목"><button style="background:var(--navy); color:white; border:none; padding:8px 15px; border-radius:6px" onclick="addItem('inc', 'new-inc-name')">추가</button></div></div>
  <div class="section"><div class="section-header">🏦 자산 현황 <span id="sum-asset" style="color:var(--asset)">0원</span></div><div class="section-body" id="bank-list"></div><div class="add-custom"><input type="text" id="new-bank-name" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd" placeholder="은행 이름"><button style="background:var(--navy); color:white; border:none; padding:8px 15px; border-radius:6px" onclick="addItem('banks', 'new-bank-name')">추가</button></div></div>
</div>
<div class="page" id="page-expense">
  <div class="section"><div class="section-header">💳 카드 관리</div><div class="section-body" id="card-list"></div><div class="add-custom"><input type="text" id="new-card-name" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd" placeholder="카드 이름"><button style="background:var(--navy); color:white; border:none; padding:8px 15px; border-radius:6px" onclick="addItem('cards', 'new-card-name')">추가</button></div></div>
  <div class="section"><div class="section-header">🍴 지출 카테고리</div><div class="section-body" id="cat-list"></div><div class="add-custom"><input type="text" id="new-cat-name" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd" placeholder="카테고리명"><button style="background:var(--navy); color:white; border:none; padding:8px 15px; border-radius:6px" onclick="addItem('cats', 'new-cat-name')">추가</button></div></div>
</div>
<div class="page" id="page-daily"><div id="daily-list" style="padding:15px"></div><button class="fab" onclick="openModal()">＋</button></div>
<div class="page" id="page-report"><div class="section"><div class="section-header">📊 <span id="yearDisplay"></span>년 결산</div><div class="section-body" style="padding:0; overflow-x:auto;"><table class="report-table"><tbody id="annual-body"></tbody></table></div></div></div>
<div class="modal" id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:flex-end; justify-content:center;" onclick="closeModal()"><div class="modal-content" style="background:white; width:100%; border-radius:20px 20px 0 0; padding:25px;" onclick="event.stopPropagation()"><h3 style="margin-bottom:15px; color:var(--navy)">📝 지출 기록</h3><div style="margin-bottom:15px"><label style="display:block; font-size:12px; margin-bottom:6px">날짜</label><input type="date" id="m-date" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px"></div><div style="margin-bottom:15px"><label style="display:block; font-size:12px; margin-bottom:6px">내용</label><input type="text" id="m-desc" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px"></div><div style="margin-bottom:15px"><label style="display:block; font-size:12px; margin-bottom:6px">카테고리</label><select id="m-cat-sel" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px"></select></div><div style="margin-bottom:15px"><label style="display:block; font-size:12px; margin-bottom:6px">결제수단</label><select id="m-card-sel" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px"></select></div><div style="margin-bottom:15px"><label style="display:block; font-size:12px; margin-bottom:6px">금액</label><input type="number" id="m-amt" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px"></div><button style="width:100%; background:var(--navy); color:white; border:none; padding:15px; border-radius:12px; font-weight:700" onclick="saveEntry()">저장하기</button></div></div>
<script>
/* 여기에 목사님의 클라이언트 ID를 넣으세요 */
const CLIENT_ID = '여기에_복사한_ID를_넣으세요'; 
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
let tokenClient, gapiInited = false, gisInited = false, driveFileId = null;
let curDate = new Date(), db = JSON.parse(localStorage.getItem('mh_sync_db')) || {};
function getMonthKey(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
function getCurrentData() { const k = getMonthKey(curDate); if(!db[k]) db[k] = { inc:{'사례비':0}, banks:{'농협':0}, cards:{'기본카드':0}, cats:{'식사':0, '헌금':0}, entries:[] }; return db[k]; }
async function save() { localStorage.setItem('mh_sync_db', JSON.stringify(db)); render(); if (driveFileId) await uploadToDrive(); }
function render() {
  const data = getCurrentData(); document.getElementById('currentMonthDisplay').textContent = curDate.getFullYear() + '년 ' + (curDate.getMonth()+1) + '월';
  const rS = (type, targetId, isInput=true) => { document.getElementById(targetId).innerHTML = Object.entries(data[type]).map(([k, v]) => `
      <div class="item-row"><span class="item-label">${k}</span>${isInput ? `<input class="item-input" type="number" value="${v||''}" onchange="updateVal('${type}', '${k}', this.value)">` : `<span>${(v||0).toLocaleString()}원</span>`}
      <button style="border:none; background:none; color:#ffcfcf" onclick="deleteItem('${type}', '${k}')">✕</button></div>`).join(''); };
  rS('inc', 'income-list'); rS('banks', 'bank-list'); rS('cards', 'card-list', false); rS('cats', 'cat-list', false);
  document.getElementById('daily-list').innerHTML = data.entries.slice().reverse().map((e, idx) => `
    <div class="daily-item" style="background:white; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,0.05)"><div><div style="font-size:11px; color:#888">${e.date} | ${e.card}</div><div style="font-weight:700">[${e.cat}] ${e.desc}</div></div><div style="font-weight:900; color:var(--expense)">-${e.amt.toLocaleString()}원</div></div>`).join('');
  document.getElementById('sum-inc').textContent = Object.values(data.inc).reduce((a,b)=>a+b, 0).toLocaleString() + '원';
  document.getElementById('sum-asset').textContent = Object.values(data.banks).reduce((a,b)=>a+b, 0).toLocaleString() + '원';
  document.getElementById('m-cat-sel').innerHTML = Object.keys(data.cats).map(k => `<option>${k}</option>`).join('');
  document.getElementById('m-card-sel').innerHTML = Object.keys(data.cards).map(k => `<option>${k}</option>`).join('');
}
function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); gapiInited = true; }); }
function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' }); gisInited = true; }
async function handleAuthClick() { tokenClient.callback = async (r) => { if (r.error) throw r; await findOrCreateSyncFile(); }; tokenClient.requestAccessToken({prompt: 'consent'}); }
async function findOrCreateSyncFile() {
  const r = await gapi.client.drive.files.list({ q: "name='pastor_budget_data.json' and spaces='appDataFolder'", fields: 'files(id, name)' });
  const f = r.result.files;
  if (f.length > 0) { driveFileId = f[0].id; await downloadFromDrive(); }
  else { const c = await gapi.client.drive.files.create({ resource: { name: 'pastor_budget_data.json', parents: ['appDataFolder'] }, fields: 'id' }); driveFileId = c.result.id; await uploadToDrive(); }
  document.getElementById('sync-status').innerText = '✅ 드라이브 연결됨'; document.getElementById('auth-btn').style.display = 'none';
}
async function uploadToDrive() { await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }, body: JSON.stringify(db) }); showToast('드라이브 동기화 완료 🙏'); }
async function downloadFromDrive() {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, { headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token } });
  const d = await r.json(); if (confirm('구글 드라이브의 데이터를 불러올까요?')) { db = d; save(); }
}
function showTab(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); if(id==='report') renderAnnual(); }
function changeMonth(d) { curDate.setMonth(curDate.getMonth()+d); render(); }
function addItem(t, i) { const n = document.getElementById(i).value.trim(); if(n){ getCurrentData()[t][n]=0; document.getElementById(i).value=''; save(); } }
function updateVal(t, k, v) { getCurrentData()[t][k]=Number(v); save(); }
function deleteItem(t, k) { if(confirm('삭제하시겠습니까?')){ delete getCurrentData()[t][k]; save(); } }
function openModal() { document.getElementById('m-date').value = new Date().toISOString().substring(0,10); document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
function saveEntry() { const d = getCurrentData(); const e = { date: document.getElementById('m-date').value, desc: document.getElementById('m-desc').value||'지출', cat: document.getElementById('m-cat-sel').value, card: document.getElementById('m-card-sel').value, amt: Number(document.getElementById('m-amt').value) }; if(!e.amt) return; d.entries.push(e); d.cards[e.card]+=e.amt; d.cats[e.cat]+=e.amt; closeModal(); save(); }
function renderAnnual() {
  const y = curDate.getFullYear(); document.getElementById('yearDisplay').textContent = y;
  let rows = '<tr><th>월</th><th>수입</th><th>지출</th><th>잔액</th></tr>';
  for(let m=1; m<=12; m++) { const k = y + '-' + String(m).padStart(2,'0'); const md = db[k] || { inc:{}, entries:[] }; const mi = Object.values(md.inc).reduce((a,b)=>a+b,0); const me = md.entries.reduce((a,b)=>a+b.amt,0); rows += `<tr><td>${m}월</td><td style="color:var(--income)">${mi.toLocaleString()}</td><td style="color:var(--expense)">${me.toLocaleString()}</td><td>${(mi-me).toLocaleString()}</td></tr>`; }
  document.getElementById('annual-body').innerHTML = rows;
}
window.onload = () => { render(); gapiLoaded(); gisLoaded(); };
</script>
</body>
</html>
