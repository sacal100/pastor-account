<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<title>목회자 가계부 - 50년 통합관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a3a5c; --gold: #c9a84c; --income: #2d6a4f; --expense: #9b2335; --asset: #1d4e89;
  --border: #dde4ed; --white: #ffffff; --bg: #eef2f7; --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: #333; padding-bottom: 80px; min-height: 100dvh; }

.app-header { background: var(--navy); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.month-selector { display: flex; align-items: center; justify-content: center; gap: 20px; }
.m-nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }

.tab-bar { display: flex; background: #0f2440; position: sticky; top: 58px; z-index: 100; overflow-x: auto; }
.tab-btn { flex: 1; min-width: 80px; color: #aaa; padding: 12px; border: none; background: none; font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
.tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); font-weight: 700; }

.page { display: none; padding: 15px; animation: fadeIn 0.3s; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.section { background: var(--white); border-radius: var(--radius); margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.section-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; background: #fcfcfc; }
.section-body { padding: 8px 15px; }

.item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; gap: 10px; }
.item-label { font-size: 14px; flex: 1; color: #444; }
.item-input { width: 110px; text-align: right; border: 1px solid var(--border); border-radius: 6px; padding: 7px; font-weight: 700; color: var(--navy); background: #fcfdfe; }
.del-item-btn { color: #ffcfcf; border: none; background: none; font-size: 18px; cursor: pointer; padding: 0 5px; }
.del-item-btn:hover { color: var(--expense); }

.add-custom { display: flex; gap: 8px; margin: 10px 0; padding: 10px 15px; background: #f1f4f8; border-radius: 8px; }
.add-custom input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
.add-btn { background: var(--navy); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; }

.report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.report-table th, .report-table td { border: 1px solid var(--border); padding: 10px 5px; text-align: right; }
.report-table th { background: #f0f4f8; text-align: center; }
.report-table td:first-child { text-align: center; font-weight: 700; background: #fafafa; }

.daily-item { background: white; padding: 15px; border-radius: var(--radius); margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
.daily-amt { font-weight: 900; font-size: 16px; color: var(--expense); }

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: flex-end; }
.modal.open { display: flex; }
.modal-content { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 25px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
.modal-field { margin-bottom: 15px; }
.modal-field label { display: block; font-size: 12px; margin-bottom: 6px; color: #666; font-weight: 700; }
.modal-field input, .modal-field select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; }

.fab { position: fixed; bottom: 25px; right: 20px; width: 60px; height: 60px; background: var(--navy); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 50; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 300; font-size: 13px; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app-header">
  <div class="month-selector">
    <button class="m-nav-btn" onclick="changeMonth(-1)">‹</button>
    <h2 id="currentMonthDisplay">2026년 4월</h2>
    <button class="m-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('income')">수입/자산</button>
  <button class="tab-btn" onclick="showTab('expense')">지출항목</button>
  <button class="tab-btn" onclick="showTab('daily')">지출기록</button>
  <button class="tab-btn" onclick="showTab('report')">연간결산</button>
</div>

<div id="toast" class="toast">저장되었습니다</div>

<div class="page active" id="page-income">
  <div class="section">
    <div class="section-header">💰 수입 항목 관리 <span id="sum-inc" style="color:var(--income)">0원</span></div>
    <div class="section-body" id="income-list"></div>
    <div class="add-custom">
      <input type="text" id="new-inc-name" placeholder="새 수입 항목 (예: 강사료)">
      <button class="add-btn" onclick="addItem('inc', 'new-inc-name')">추가</button>
    </div>
  </div>
  <div class="section">
    <div class="section-header">🏦 은행별 자산 <span id="sum-asset" style="color:var(--asset)">0원</span></div>
    <div class="section-body" id="bank-list"></div>
    <div class="add-custom">
      <input type="text" id="new-bank-name" placeholder="은행 이름 입력">
      <button class="add-btn" onclick="addItem('bank', 'new-bank-name')">추가</button>
    </div>
  </div>
</div>

<div class="page" id="page-expense">
  <div class="section">
    <div class="section-header">💳 카드별 지출 현황</div>
    <div class="section-body" id="card-list"></div>
    <div class="add-custom">
      <input type="text" id="new-card-name" placeholder="카드 이름 입력">
      <button class="add-btn" onclick="addItem('card', 'new-card-name')">추가</button>
    </div>
  </div>
  <div class="section">
    <div class="section-header">🍴 지출 카테고리 설정</div>
    <div class="section-body" id="cat-list"></div>
    <div class="add-custom">
      <input type="text" id="new-cat-name" placeholder="항목 (식사, 도서 등)">
      <button class="add-btn" onclick="addItem('cat', 'new-cat-name')">추가</button>
    </div>
  </div>
</div>

<div class="page" id="page-daily">
  <div id="daily-list"></div>
  <button class="fab" onclick="openModal()">＋</button>
</div>

<div class="page" id="page-report">
  <div class="section">
    <div class="section-header">📊 <span id="yearDisplay"></span>년 재정 결산</div>
    <div class="section-body" style="padding:0; overflow-x:auto;">
      <table class="report-table">
        <thead>
          <tr><th>월</th><th>수입</th><th>지출</th><th>잔액</th></tr>
        </thead>
        <tbody id="annual-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:15px; color:var(--navy)">📝 지출 상세 기록</h3>
    <div class="modal-field"><label>날짜</label><input type="date" id="m-date"></div>
    <div class="modal-field"><label>내용</label><input type="text" id="m-desc" placeholder="어디에 사용하셨나요?"></div>
    <div class="modal-field"><label>카테고리</label><select id="m-cat-sel"></select></div>
    <div class="modal-field"><label>결제 수단</label><select id="m-card-sel"></select></div>
    <div class="modal-field"><label>금액</label><input type="number" id="m-amt" placeholder="0"></div>
    <button class="add-btn" style="width:100%; padding:15px; font-size:16px" onclick="saveEntry()">지출 저장하기</button>
  </div>
</div>

<script>
let curDate = new Date();
// 향후 50년 사용을 위해 더 견고한 DB 구조 사용
let db = JSON.parse(localStorage.getItem('mh_final_db')) || {};

function getMonthKey(date) {
  return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
}

function getCurrentData() {
  const key = getMonthKey(curDate);
  if(!db[key]) {
    db[key] = {
      inc: { '사례비': 0, '목회비': 0, '심방비': 0 },
      banks: { '국민은행': 0, '농협': 0 },
      cards: { '국민카드': 0 },
      cats: { '식사': 0, '물품구매': 0, '헌금': 0, '도서': 0 },
      entries: []
    };
  }
  return db[key];
}

function save() {
  localStorage.setItem('mh_final_db', JSON.stringify(db));
  render();
}

function changeMonth(delta) {
  curDate.setMonth(curDate.getMonth() + delta);
  render();
}

function addItem(type, inputId) {
  const name = document.getElementById(inputId).value.trim();
  if(!name) return;
  const data = getCurrentData();
  data[type][name] = 0;
  document.getElementById(inputId).value = '';
  save();
}

function updateVal(type, key, val) {
  const data = getCurrentData();
  data[type][key] = Number(val);
  save();
}

function deleteItem(type, key) {
  if(!confirm('"' + key + '" 항목을 삭제하시겠습니까? 관련 데이터가 0으로 처리됩니다.')) return;
  const data = getCurrentData();
  delete data[type][key];
  save();
}

function showTab(tabId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tabId).classList.add('active');
  event.target.classList.add('active');
  if(tabId === 'report') renderAnnual();
}

function render() {
  const data = getCurrentData();
  document.getElementById('currentMonthDisplay').textContent = curDate.getFullYear() + '년 ' + (curDate.getMonth()+1) + '월';

  // 수입 항목 렌더링
  document.getElementById('income-list').innerHTML = Object.entries(data.inc).map(([k, v]) => `
    <div class="item-row">
      <span class="item-label">${k}</span>
      <input class="item-input" type="number" value="${v||''}" onchange="updateVal('inc', '${k}', this.value)">
      <button class="del-item-btn" onclick="deleteItem('inc', '${k}')">✕</button>
    </div>`).join('');

  // 자산 렌더링
  document.getElementById('bank-list').innerHTML = Object.entries(data.banks).map(([k, v]) => `
    <div class="item-row">
      <span class="item-label">${k}</span>
      <input class="item-input" type="number" value="${v||''}" onchange="updateVal('banks', '${k}', this.value)">
      <button class="del-item-btn" onclick="deleteItem('banks', '${k}')">✕</button>
    </div>`).join('');

  // 카드/카테고리 (수정 및 삭제 가능하도록 구현)
  const renderEx = (type, targetId) => {
    document.getElementById(targetId).innerHTML = Object.entries(data[type]).map(([k, v]) => `
      <div class="item-row">
        <span class="item-label">${k}</span>
        <span style="font-weight:700; font-size:13px">${v.toLocaleString()}원</span>
        <button class="del-item-btn" onclick="deleteItem('${type}', '${k}')">✕</button>
      </div>`).join('');
  };
  renderEx('cards', 'card-list');
  renderEx('cats', 'cat-list');

  // 기록 리스트
  document.getElementById('daily-list').innerHTML = data.entries.slice().reverse().map((e, idx) => `
    <div class="daily-item">
      <div>
        <div style="font-size:11px; color:#888">${e.date} | ${e.card}</div>
        <div style="font-weight:700">[${e.cat}] ${e.desc}</div>
      </div>
      <div style="display:flex; align-items:center; gap:12px">
        <div class="daily-amt">-${e.amt.toLocaleString()}원</div>
        <button class="del-item-btn" style="color:#ddd" onclick="delEntry(${data.entries.length - 1 - idx})">✕</button>
      </div>
    </div>`).join('');

  // 합계 업데이트
  const tInc = Object.values(data.inc).reduce((a,b)=>a+b, 0);
  const tAst = Object.values(data.banks).reduce((a,b)=>a+b, 0);
  document.getElementById('sum-inc').textContent = tInc.toLocaleString() + '원';
  document.getElementById('sum-asset').textContent = tAst.toLocaleString() + '원';

  // 모달 셀렉트
  document.getElementById('m-cat-sel').innerHTML = Object.keys(data.cats).map(k => `<option>${k}</option>`).join('');
  document.getElementById('m-card-sel').innerHTML = Object.keys(data.cards).map(k => `<option>${k}</option>`).join('');
}

function renderAnnual() {
  const year = curDate.getFullYear();
  document.getElementById('yearDisplay').textContent = year;
  let rows = '';
  for(let m=1; m<=12; m++) {
    const key = year + '-' + String(m).padStart(2, '0');
    const mData = db[key] || { inc:{}, entries:[] };
    const mInc = Object.values(mData.inc).reduce((a,b)=>a+b, 0);
    const mExp = mData.entries.reduce((a,b)=>a+b.amt, 0);
    rows += `<tr><td>${m}월</td><td style="color:var(--income)">${mInc.toLocaleString()}</td><td style="color:var(--expense)">${mExp.toLocaleString()}</td><td style="font-weight:700">${(mInc-mExp).toLocaleString()}</td></tr>`;
  }
  document.getElementById('annual-body').innerHTML = rows;
}

function openModal() {
  document.getElementById('m-date').value = new Date().toISOString().substring(0, 10);
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) { document.getElementById('modal').classList.remove('open'); }

function saveEntry() {
  const data = getCurrentData();
  const amt = Number(document.getElementById('m-amt').value);
  if(!amt) return;
  const entry = {
    date: document.getElementById('m-date').value,
    desc: document.getElementById('m-desc').value || '지출',
    cat: document.getElementById('m-cat-sel').value,
    card: document.getElementById('m-card-sel').value,
    amt: amt
  };
  data.entries.push(entry);
  data.cards[entry.card] += amt;
  data.cats[entry.cat] += amt;
  closeModal();
  save();
  showToast('기도하는 마음으로 기록했습니다 🙏');
}

function delEntry(idx) {
  const data = getCurrentData();
  const e = data.entries[idx];
  data.cards[e.card] -= e.amt;
  data.cats[e.cat] -= e.amt;
  data.entries.splice(idx, 1);
  save();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

window.onload = render;
</script>
</body>
</html>
